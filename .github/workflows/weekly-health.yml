name: weekly health

# The chore nobody remembers: prove the *published* package still onboards a
# stranger. Runs the keyless demo loop from the npm registry (not the repo),
# weekly; files one deduped issue when it rots.

on:
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  published-demo-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: demo loop straight from the npm registry
        run: |
          set -euo pipefail
          npm install -g cronfounder@latest
          scripts/smoke-loop.sh "$(mktemp -d)" cronfounder
          echo "published package still closes the loop"
      - name: file an issue when the published package rots
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "health",
            });
            if (open.length > 0) return; // one open health issue is enough
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: "weekly health: the published npm package no longer closes the demo loop",
              labels: ["health"],
              body: `The weekly keyless demo loop against \`cronfounder@latest\` failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nThis is the exact first-touch a new user has — treat as an onboarding outage.`,
            });
