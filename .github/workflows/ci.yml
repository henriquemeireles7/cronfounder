name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # The release artifact — not the source tree — is the acceptance target:
  # pack a tarball, install it cold, and run the keyless demo loop from it.
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm pack
      - name: install tarball in a clean dir and run the demo loop
        run: |
          set -euo pipefail
          TARBALL="$PWD/$(ls cronfounder-*.tgz)"
          WORK="$(mktemp -d)"
          cd "$WORK"
          npm init -y >/dev/null
          npm install "$TARBALL" >/dev/null
          export CRONFOUNDER_NOW=2026-07-13T12:00:00Z
          ./node_modules/.bin/cronfounder init demo --demo --yes --quiet
          cd demo
          ../node_modules/.bin/cronfounder inbox --json | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const j=JSON.parse(d);if(!j.ok||j.data.open.length!==1||j.data.open[0].kind!=='approve_hypothesis'){console.error('demo loop did not reach the funding card:',d);process.exit(1)};console.log('funding card reached: '+j.data.open[0].id)})"
          ../node_modules/.bin/cronfounder resolve R-1 --approve --quiet
          ../node_modules/.bin/cronfounder build --quiet
          ../node_modules/.bin/cronfounder rebuild --quiet
          echo "tarball install closes the loop"

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: check landing page links resolve (repo-relative ones must exist in-tree)
        run: |
          set -euo pipefail
          if [ ! -f site/links.txt ]; then echo "no site/links.txt yet"; exit 0; fi
          fail=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            case "$url" in
              https://github.com/henriquemeireles7/cronfounder/blob/master/*)
                p="${url#https://github.com/henriquemeireles7/cronfounder/blob/master/}"
                [ -f "$p" ] || { echo "MISSING FILE: $p (from $url)"; fail=1; } ;;
              https://github.com/henriquemeireles7/cronfounder/tree/master/*)
                p="${url#https://github.com/henriquemeireles7/cronfounder/tree/master/}"
                [ -d "$p" ] || { echo "MISSING DIR: $p (from $url)"; fail=1; } ;;
              *) : ;; # external URLs are checked at deploy review, not per-push
            esac
          done < site/links.txt
          exit $fail
