name: Feature request
description: Propose a new command, flag, or behavior.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today? What's the gap this fills?
    validations:
      required: true
  - type: textarea
    id: proposed-behavior
    attributes:
      label: Proposed behavior
      description: What should the command/flag/output look like? Include example invocations if you can.
    validations:
      required: true
  - type: textarea
    id: invariant
    attributes:
      label: Which invariant does this touch, if any?
      description: >
        See README.md#the-ten-invariants. If your proposal writes reality outside a sensor,
        skips the gate, lets an actor buy past a risk gate, or otherwise brushes up against
        one of the ten, say which one and how you think it should be handled.
    validations:
      required: false
